services:
  postgres:
    image: postgres:16-alpine
    container_name: sales-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: sales_db
    ports:
      - "5432:5432"
    volumes:
      - security_postgres_data:/var/lib/postgresql/data

volumes:
  security_postgres_data:
